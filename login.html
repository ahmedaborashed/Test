<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Judran Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: url('bac.jpg') no-repeat center/cover;
  position:relative;
}

body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
}

.login-box{
  position:relative;
  z-index:2;
  width:350px;
  padding:35px;
  border-radius:20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  box-shadow: 0 0 40px rgba(255,140,0,0.4);
  text-align:center;
  animation: fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

h2{
  color:white;
  margin-bottom:20px;
}

.input-box{
  position:relative;
  margin:15px 0;
}

.input-box input{
  width:100%;
  padding:12px 40px 12px 12px; /* 👈 المهم هنا */
  border:none;
  border-radius:10px;
  outline:none;
  background: rgba(255,255,255,0.1);
  color:white;
}

.input-box i{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  color:#ccc;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background: linear-gradient(45deg, orange, #ff5e00);
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px orange;
}

.error{
  color:red;
  margin-top:10px;
  font-size:14px;
}

/* زرار اللغة */
.lang {
  position: absolute;
  top: 15px;
  right: 15px;
}

.lang button {
  background: rgba(0,0,0,0.5);
  border: 1px solid white;
  color: white;
  padding: 5px 10px;
  cursor: pointer;
}

@media(max-width:400px){
  .login-box{
    width:90%;
  }
}

</style>
</head>

<body>

<div class="lang">
  <button onclick="toggleLang()">AR / EN</button>
</div>

<div class="login-box">
  <h2 id="title">جدران جروب</h2>

  <div class="input-box">
    <input type="email" id="email" placeholder="البريد الإلكتروني">
    <i class="fa-solid fa-envelope"></i>
  </div>

  <div class="input-box">
    <input type="password" id="password" placeholder="كلمة المرور">
    <i class="fa-solid fa-lock"></i>
  </div>

  <button id="loginBtn" onclick="login()">تسجيل الدخول</button>

  <div class="error" id="error"></div>
</div>

<script type="module">

import { auth, db } from "./js/firebase.js";
import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let isArabic = true;

// 🔥 تغيير اللغة
window.toggleLang = function(){
  isArabic = !isArabic;
  applyLang();
};

function applyLang(){

  if(isArabic){
    document.documentElement.lang = "ar";
    document.body.dir = "rtl";

    document.getElementById("title").innerText = "جدران جروب";

    document.getElementById("email").placeholder = "البريد الإلكتروني";
    document.getElementById("password").placeholder = "كلمة المرور";

    document.getElementById("loginBtn").innerHTML =
      '<i class="fa-solid fa-right-to-bracket"></i> تسجيل الدخول';

  }else{
    document.documentElement.lang = "en";
    document.body.dir = "ltr";

    document.getElementById("title").innerText = "Judran Group";

    document.getElementById("email").placeholder = "Email";
    document.getElementById("password").placeholder = "Password";

    document.getElementById("loginBtn").innerHTML =
      '<i class="fa-solid fa-right-to-bracket"></i> Login';
  }
}

// 🔥 Login
window.login = async function(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const errorDiv = document.getElementById("error");

  errorDiv.innerText = "";

  try{
    const userCred = await signInWithEmailAndPassword(auth, email, password);
    const uid = userCred.user.uid;

    const userDoc = await getDoc(doc(db, "users", uid));

    if(userDoc.exists()){
      const data = userDoc.data();

      localStorage.setItem("role", data.role);
      localStorage.setItem("name", data.name);

      window.location.href = "dashboard.html";

    }else{
      errorDiv.innerText = isArabic ? "المستخدم غير موجود" : "User not found";
    }

  }catch(err){
    errorDiv.innerText = isArabic ? "فشل تسجيل الدخول" : "Login Failed";
  }
};

// تشغيل اللغة الافتراضية (عربي)
applyLang();

</script>

</body>
</html>
